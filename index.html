<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🏠 晚餐點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
    </style>
</head>
<body class="pb-28">
    <div class="max-w-lg mx-auto p-4">
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="showAll()" class="bg-orange-200 px-4 py-2 rounded-full text-sm font-bold">全部</button>
            <button onclick="filterType('雞')" class="bg-white border px-4 py-2 rounded-full text-sm">雞</button>
            <button onclick="filterType('牛')" class="bg-white border px-4 py-2 rounded-full text-sm">牛</button>
            <button onclick="filterType('豬')" class="bg-white border px-4 py-2 rounded-full text-sm">豬</button>
            <button onclick="showCountries()" class="bg-white border px-4 py-2 rounded-full text-sm text-orange-700 font-bold">國家 🌍</button>
        </div>

        <div id="menuList" class="space-y-6"></div>
    </div>

    <script>
        const dishes = [
            { name: "日式照燒牛", type: "牛", country: "日本" },
            { name: "泰式冬陰功", type: "海鮮", country: "泰國" },
            { name: "韓式泡菜豬", type: "豬", country: "韓國" },
            { name: "意式肉醬麵", type: "豬", country: "意大利" },
            { name: "西班牙海鮮飯", type: "海鮮", country: "西班牙" }
        ];

        // 1. 一般分類顯示
        function filterType(type) {
            const list = document.getElementById('menuList');
            const filtered = dishes.filter(d => d.type === type);
            list.innerHTML = filtered.map(d => `<div class="bg-white p-4 rounded-2xl border">${d.name}</div>`).join('');
        }

        // 2. 國家分組顯示 (這是你要求的重點)
        function showCountries() {
            const list = document.getElementById('menuList');
            const countries = [...new Set(dishes.map(d => d.country))];
            
            list.innerHTML = countries.map(country => `
                <div>
                    <h2 class="text-orange-800 font-bold text-lg mb-2">${country}</h2>
                    <div class="space-y-2">
                        ${dishes.filter(d => d.country === country).map(d => 
                            `<div class="bg-white p-4 rounded-2xl border cursor-pointer hover:border-orange-300 transition" onclick="this.classList.toggle('bg-orange-50')">${d.name}</div>`
                        ).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showAll() { /* 顯示全部邏輯 */ }
        
        showAll();
    </script>
</body>
</html>
